<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Message for You ❤️</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fdf6e3;
            color: #333;
            margin: 0;
            padding: 0;
        }
        img {
            border-radius: 10px;
            margin-top: 20px;
            width: 300px;
            height: auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .message {
            margin: 20px;
            padding: 20px;
            background-color: #fff9db;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <h1>🌹 A Special Note 🌹</h1>
    <div class="message">
        <p>Hey love,</p>
        <p>You’re my sunshine on a cloudy day and the reason behind my smile. 😊</p>
        <p>Every moment with you is magical, and I’m so grateful for you. 💖</p>
        <p>With love, always,</p>
        <p>Your [nickname]</p>
    </div>
    <img src="Her_Image.jpg" alt="Your Beautiful Smile">
</body>
</html>
